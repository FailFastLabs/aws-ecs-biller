services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aws_cur
      POSTGRES_USER: cur_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cur_user -d aws_cur"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/accounts/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: celery -A workers worker --loglevel=info
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: >
      sh -c "
        pip install -r requirements/development.txt --quiet &&
        pytest tests/ --cov=apps --cov-report=term-missing
      "
    volumes:
      - ..:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: test-secret-key

volumes:
  pgdata:
