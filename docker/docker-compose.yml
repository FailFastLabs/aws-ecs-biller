services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aws_cur
      POSTGRES_USER: cur_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  web-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: celery -A workers worker --loglevel=info
    volumes:
      - ..:/app
    env_file: ../.env
    depends_on:
      - db
      - redis

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        TARGETPLATFORM: ${TARGETPLATFORM:-linux/amd64}
    command: >
      sh -c "
        pip install -r requirements/development.txt --quiet &&
        pytest tests/ --cov=apps --cov-report=term-missing
      "
    volumes:
      - ..:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: test-secret-key

volumes:
  pgdata:
