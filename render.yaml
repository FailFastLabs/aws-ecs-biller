services:
  - type: web
    name: aws-ecs-biller
    runtime: python
    buildCommand: >
      pip install -r requirements/base.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aws-ecs-biller-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aws-ecs-biller-redis
          type: redis
          property: connectionString
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
    healthCheckPath: /api/v1/accounts/
    autoDeploy: true

  - type: worker
    name: aws-ecs-biller-worker
    runtime: python
    buildCommand: pip install -r requirements/base.txt
    startCommand: celery -A workers worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        fromService:
          name: aws-ecs-biller
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: aws-ecs-biller-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aws-ecs-biller-redis
          type: redis
          property: connectionString
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  - type: redis
    name: aws-ecs-biller-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: aws-ecs-biller-db
    databaseName: aws_cur
    user: cur_user
    plan: starter
